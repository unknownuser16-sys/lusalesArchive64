<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Lusales Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Roboto',sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .admin-container { width:100%; max-width:1200px; }
        .admin-dashboard { display:none; background:white; border-radius:10px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
        .admin-header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .admin-header h1 { font-size:1.3rem; font-family:'Merriweather',serif; }
        .admin-header button { background:#e74c3c; color:white; border:none; padding:0.5rem 1rem; border-radius:5px; cursor:pointer; transition:background 0.3s; }
        .admin-header button:hover { background:#c0392b; }
        .admin-main { display:flex; min-height:600px; }
        .admin-sidebar { width:220px; background:#34495e; padding:2rem 0; flex-shrink:0; }
        .sidebar-btn { background:none; border:none; color:white; padding:1rem 2rem; width:100%; text-align:left; cursor:pointer; display:flex; align-items:center; gap:0.75rem; font-size:0.95rem; transition:background 0.3s; }
        .sidebar-btn:hover { background:#2c3e50; }
        .sidebar-btn.active { background:#3498db; }
        .admin-content { flex:1; padding:2rem; overflow-y:auto; }
        .admin-section { display:none; }
        .admin-section.active { display:block; }
        .admin-section h2 { margin-bottom:1.5rem; color:#2c3e50; font-family:'Merriweather',serif; }
        .add-btn { background:#27ae60; color:white; border:none; padding:0.75rem 1.5rem; border-radius:5px; cursor:pointer; display:inline-flex; align-items:center; gap:0.5rem; margin-bottom:1.5rem; font-size:0.95rem; transition:background 0.3s; }
        .add-btn:hover { background:#219a52; }
        .edit-btn,.delete-btn { padding:0.4rem 0.75rem; border:none; border-radius:3px; cursor:pointer; color:white; font-size:0.85rem; transition:opacity 0.2s; }
        .edit-btn { background:#3498db; }
        .delete-btn { background:#e74c3c; }
        .edit-btn:hover,.delete-btn:hover { opacity:0.85; }
        .book-list,.chapter-list { display:grid; gap:1rem; }
        .book-item,.chapter-item { background:#f8f9fa; padding:1rem 1.25rem; border-radius:5px; border-left:4px solid #3498db; display:flex; justify-content:space-between; align-items:center; gap:1rem; }
        .book-item h4,.chapter-item h4 { margin:0 0 0.25rem; color:#2c3e50; }
        .book-meta,.chapter-preview { margin:0; font-size:0.85rem; color:#7f8c8d; }
        .book-item small,.chapter-item small { font-size:0.8rem; color:#95a5a6; }
        .book-actions,.chapter-actions { display:flex; gap:0.5rem; flex-shrink:0; }
        .empty-state { text-align:center; padding:3rem; color:#95a5a6; }
        .empty-state i { font-size:2.5rem; display:block; margin-bottom:1rem; }
        .upload-zone { border:2px dashed #ddd; border-radius:10px; padding:3rem; text-align:center; cursor:pointer; transition:border-color 0.3s,background 0.3s; margin-bottom:1.5rem; }
        .upload-zone:hover { border-color:#3498db; background:#f0f8ff; }
        .upload-zone i { font-size:3rem; color:#3498db; display:block; margin-bottom:1rem; }
        .chapter-filter { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
        .chapter-filter select { padding:0.6rem 1rem; border:2px solid #ddd; border-radius:5px; font-size:0.95rem; outline:none; flex:1; min-width:200px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:3000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:2rem; border-radius:10px; width:90%; max-width:520px; }
        .modal-content h3 { margin-bottom:1.5rem; color:#2c3e50; font-family:'Merriweather',serif; }
        .modal-content input,.modal-content textarea,.modal-content select { width:100%; padding:0.75rem; margin-bottom:1rem; border:2px solid #ddd; border-radius:5px; font-size:0.95rem; font-family:inherit; outline:none; transition:border-color 0.3s; box-sizing:border-box; }
        .modal-content input:focus,.modal-content textarea:focus { border-color:#3498db; }
        .modal-content textarea { resize:vertical; min-height:180px; }
        .modal-actions { display:flex; gap:1rem; justify-content:flex-end; }
        .cancel-btn { background:#95a5a6; color:white; border:none; padding:0.75rem 1.5rem; border-radius:5px; cursor:pointer; font-size:0.95rem; }
        .cancel-btn:hover { background:#7f8c8d; }
        .save-btn { background:#27ae60; color:white; border:none; padding:0.75rem 1.5rem; border-radius:5px; cursor:pointer; font-size:0.95rem; }
        .save-btn:hover { background:#219a52; }
        .access-denied { width:100%; max-width:500px; padding:20px; }
        .access-form { background:white; padding:2.5rem; border-radius:15px; box-shadow:0 20px 40px rgba(0,0,0,0.3); text-align:center; }
        .access-form h2 { color:#2c3e50; margin-bottom:1rem; }
        .access-form > p { color:#7f8c8d; margin-bottom:2rem; line-height:1.6; }
        .input-group { display:flex; gap:10px; margin-bottom:1.5rem; }
        .input-group input { flex:1; padding:1rem; border:2px solid #ddd; border-radius:8px; font-size:1rem; outline:none; }
        .input-group input:focus { border-color:#3498db; }
        .input-group button { background:#3498db; color:white; border:none; padding:0 2rem; border-radius:8px; cursor:pointer; font-size:1rem; }
        .input-group button:hover { background:#2980b9; }
        .error-msg { color:#e74c3c; display:none; align-items:center; justify-content:center; gap:8px; font-size:0.9rem; }
        .hint { font-size:0.85rem; color:#95a5a6; margin-top:1.5rem; border-top:1px solid #eee; padding-top:1rem; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-5px)} 20%,40%,60%,80%{transform:translateX(5px)} }
    </style>
</head>
<body>

<!-- Firebase SDKs via CDN (compat version - no imports needed) -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<div class="admin-container">
    <div class="admin-dashboard" id="adminDashboard">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Lusales Archive — Admin</h1>
            <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div class="admin-main">
            <div class="admin-sidebar">
                <button class="sidebar-btn active" data-section="books"><i class="fas fa-book"></i> Books</button>
                <button class="sidebar-btn" data-section="chapters"><i class="fas fa-file-alt"></i> Chapters</button>
                <button class="sidebar-btn" data-section="upload"><i class="fas fa-upload"></i> Upload</button>
            </div>
            <div class="admin-content">
                <!-- BOOKS -->
                <div class="admin-section active" id="booksSection">
                    <h2><i class="fas fa-book"></i> Manage Books</h2>
                    <button class="add-btn" onclick="showAddBookForm()"><i class="fas fa-plus"></i> Add New Book</button>
                    <div class="book-list" id="booksList"></div>
                </div>
                <!-- CHAPTERS -->
                <div class="admin-section" id="chaptersSection">
                    <h2><i class="fas fa-file-alt"></i> Manage Chapters</h2>
                    <div class="chapter-filter">
                        <select id="bookSelect"><option value="">Select a book...</option></select>
                        <button class="add-btn" style="margin-bottom:0" onclick="showAddChapterForm()"><i class="fas fa-plus"></i> Add Chapter</button>
                    </div>
                    <div class="chapter-list" id="adminChaptersList"></div>
                </div>
                <!-- UPLOAD -->
                <div class="admin-section" id="uploadSection">
                    <h2><i class="fas fa-upload"></i> Upload Files</h2>
                    <div class="upload-zone" id="uploadZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to upload or drag &amp; drop files here</p>
                        <small style="color:#95a5a6">Note: file uploads are for reference only in this version</small>
                        <input type="file" id="fileUpload" multiple style="display:none">
                    </div>
                    <div id="uploadProgress" style="display:none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ADD BOOK MODAL -->
<div class="modal" id="addBookModal">
    <div class="modal-content">
        <h3><i class="fas fa-book"></i> Add New Book</h3>
        <input type="text" id="bookTitle" placeholder="Book title *">
        <input type="text" id="bookAuthor" placeholder="Author *">
        <textarea id="bookDescription" placeholder="Description (optional)"></textarea>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeModal('addBookModal')">Cancel</button>
            <button class="save-btn" onclick="addBook()"><i class="fas fa-save"></i> Save Book</button>
        </div>
    </div>
</div>

<!-- ADD CHAPTER MODAL -->
<div class="modal" id="addChapterModal">
    <div class="modal-content">
        <h3><i class="fas fa-file-alt"></i> Add New Chapter</h3>
        <input type="text" id="chapterTitleInput" placeholder="Chapter title *">
        <input type="date" id="chapterDate">
        <textarea id="chapterContent" placeholder="Paste your chapter content here *" style="min-height:220px"></textarea>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeModal('addChapterModal')">Cancel</button>
            <button class="save-btn" onclick="addChapter()"><i class="fas fa-save"></i> Save Chapter</button>
        </div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
