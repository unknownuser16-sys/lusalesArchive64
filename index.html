<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusales Archive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Load theme instantly before paint to avoid flash -->
    <script>
        (function() {
            const saved = localStorage.getItem('lusales_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1 onclick="window.scrollTo({top:0,behavior:'smooth'})">
                    <i class="fas fa-book"></i> lusaleArchive
                </h1>
            </div>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#library">Library</a>
                <a href="#recent">Recent</a>
                <div class="search-box">
                    <input type="text" placeholder="Search books..." id="searchInput">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <!-- Theme switcher -->
                <div id="themeSwitcherMount"></div>
                <!-- Auth -->
                <div class="user-menu" id="userMenu">
                    <button class="auth-btn" id="authBtn" onclick="handleAuthClick()">
                        <i class="fab fa-google"></i> Sign in
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                        <button class="signout-btn" onclick="signOut()">
                            <i class="fas fa-sign-out-alt"></i> Sign out
                        </button>
                    </div>
                </div>
            </div>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <main class="container">

        <section class="hero" id="home">
            <div class="hero-content">
                <h2>Welcome to the Archive</h2>
                <p>A collection of original stories and chapters, updated regularly.</p>
                <div class="hero-divider">— ✦ —</div>
            </div>
            <!-- Live stats -->
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="statBooks">—</span>
                    <span class="stat-label">Books</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statChapters">—</span>
                    <span class="stat-label">Chapters</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statUpdated">—</span>
                    <span class="stat-label">Last Update</span>
                </div>
            </div>
        </section>

        <section class="featured-books" id="library">
            <div class="section-header">
                <h2><i class="fas fa-star"></i> Featured Books</h2>
            </div>
            <div class="books-grid" id="featuredBooks"></div>
        </section>

        <section class="recent-chapters" id="recent">
            <div class="section-header">
                <h2><i class="fas fa-clock"></i> Recent Updates</h2>
            </div>
            <div class="chapters-list" id="recentChapters"></div>
        </section>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Lusales Archive · All rights reserved.</p>
            <div class="footer-links">
                <a href="#privacy">Privacy</a>
                <a href="#terms">Terms</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="theme.js"></script>
    <script src="main.js"></script>
</body>
</html>
