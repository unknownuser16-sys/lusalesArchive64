<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusales Archive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1><i class="fas fa-book"></i> lusaleArchive</h1>
            </div>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#library">Library</a>
                <a href="#recent">Recent</a>
                <div class="search-box">
                    <input type="text" placeholder="Search books...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="container">

        <section class="hero" id="home">
            <div class="hero-content">
                <h2>Welcome to the Archive</h2>
                <p>A collection of stories and chapters, updated regularly.</p>
                <div class="hero-divider">— ✦ —</div>
            </div>
        </section>

        <section class="featured-books" id="library">
            <h2><i class="fas fa-star"></i> Featured Books</h2>
            <div class="books-grid" id="featuredBooks"></div>
        </section>

        <section class="recent-chapters" id="recent">
            <h2><i class="fas fa-clock"></i> Recent Updates</h2>
            <div class="chapters-list" id="recentChapters"></div>
        </section>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Lusales Archive. All rights reserved.</p>
            <div class="footer-links">
                <a href="#privacy">Privacy</a>
                <a href="#terms">Terms</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </footer>

    <div class="reader-modal" id="readerModal">
        <div class="reader-container">
            <div class="reader-header">
                <h3 id="chapterTitle">Chapter Title</h3>
                <div class="reader-controls">
                    <button class="zoom-btn" data-action="zoom-in"><i class="fas fa-search-plus"></i></button>
                    <button class="zoom-btn" data-action="zoom-out"><i class="fas fa-search-minus"></i></button>
                    <button class="close-reader"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="reader-content" id="readerContent"></div>
            <div class="reader-navigation">
                <button id="prevChapter"><i class="fas fa-chevron-left"></i> Previous</button>
                <button id="nextChapter">Next <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- Firebase compat SDKs — no imports needed -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="main.js"></script>
</body>
</html>
