<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading — Lusales Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #0c0c0e;
            --bg-card:    #111116;
            --border:     #1e1e28;
            --accent:     #c8973a;
            --accent-dim: #7a5820;
            --text:       #e8e4d9;
            --text-muted: #6e6860;
            --text-dim:   #3a3830;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body:    'Crimson Text', Georgia, serif;
            --font-mono:    'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1.2rem;
            line-height: 1.85;
            min-height: 100vh;
        }

        /* ── TOP BAR ── */
        .reader-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 56px;
            background: rgba(12,12,14,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            gap: 1rem;
            transition: opacity 0.4s, transform 0.4s;
        }

        .reader-bar.hidden {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .bar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .bar-title {
            font-family: var(--font-display);
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-title span {
            color: var(--accent);
        }

        .bar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .font-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .font-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── PROGRESS BAR ── */
        .progress-bar {
            position: fixed;
            top: 56px;
            left: 0;
            height: 2px;
            background: var(--accent);
            width: 0%;
            z-index: 99;
            transition: width 0.1s;
        }

        /* ── MAIN READER CONTENT ── */
        .reader-page {
            max-width: 680px;
            margin: 0 auto;
            padding: 100px 2rem 120px;
        }

        .chapter-header {
            margin-bottom: 3.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .book-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            display: block;
        }

        .chapter-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .chapter-meta {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── BODY TEXT ── */
        .chapter-body p {
            margin-bottom: 1.6em;
            text-indent: 2em;
            color: var(--text);
        }

        .chapter-body p:first-child {
            text-indent: 0;
        }

        .chapter-body p:first-child::first-letter {
            font-family: var(--font-display);
            font-size: 3.8em;
            font-weight: 700;
            color: var(--accent);
            float: left;
            line-height: 0.75;
            margin-right: 0.08em;
            margin-top: 0.12em;
        }

        /* ── CHAPTER NAV ── */
        .chapter-nav {
            margin-top: 5rem;
            padding-top: 2.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.9rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.25s;
            text-decoration: none;
            max-width: 45%;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(200,151,58,0.05);
        }

        .nav-btn:disabled,
        .nav-btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
        }

        .nav-btn-inner {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .nav-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .nav-title {
            font-size: 0.82rem;
            color: inherit;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chapter-divider {
            color: var(--accent-dim);
            font-family: var(--font-display);
            letter-spacing: 0.4em;
            font-size: 0.85rem;
            text-align: center;
        }

        /* ── LOADING ── */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-inner {
            text-align: center;
        }

        .loading-inner i {
            font-size: 2rem;
            color: var(--accent);
            animation: spin 1.5s linear infinite;
            display: block;
            margin-bottom: 1rem;
        }

        .loading-inner p {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR STATE ── */
        .error-screen {
            display: none;
            text-align: center;
            padding: 6rem 2rem;
        }

        .error-screen i {
            font-size: 3rem;
            color: var(--accent-dim);
            display: block;
            margin-bottom: 1.5rem;
        }

        .error-screen h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .error-screen p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .error-screen a {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--accent-dim);
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .error-screen a:hover {
            background: rgba(200,151,58,0.1);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .reader-page { padding: 90px 1.25rem 100px; }
            .reader-bar { padding: 0 1rem; }
            .bar-title { display: none; }
            .nav-title { max-width: 100px; }
        }
    </style>
</head>
<body>

<!-- Loading screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
        <i class="fas fa-book-open"></i>
        <p>Opening chapter...</p>
    </div>
</div>

<!-- Top bar -->
<div class="reader-bar" id="readerBar">
    <div class="bar-left">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </button>
        <span class="bar-title" id="barTitle">Loading...</span>
    </div>
    <div class="bar-right">
        <button class="font-btn" onclick="changeFontSize(-1)" title="Smaller text">A-</button>
        <button class="font-btn" onclick="changeFontSize(1)" title="Larger text">A+</button>
    </div>
</div>

<!-- Reading progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Main content -->
<div class="reader-page" id="readerPage" style="display:none">

    <div class="chapter-header">
        <span class="book-label" id="bookLabel">— book —</span>
        <h1 id="chapterTitle">Chapter Title</h1>
        <div class="chapter-meta" id="chapterMeta"></div>
    </div>

    <div class="chapter-body" id="chapterBody"></div>

    <div class="chapter-divider">— ✦ —</div>

    <div class="chapter-nav">
        <button class="nav-btn disabled" id="prevBtn" onclick="navigateChapter(-1)">
            <i class="fas fa-chevron-left"></i>
            <div class="nav-btn-inner">
                <span class="nav-label">Previous</span>
                <span class="nav-title" id="prevTitle">—</span>
            </div>
        </button>

        <button class="nav-btn disabled" id="nextBtn" onclick="navigateChapter(1)">
            <div class="nav-btn-inner" style="text-align:right">
                <span class="nav-label">Next</span>
                <span class="nav-title" id="nextTitle">—</span>
            </div>
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>

<!-- Error screen -->
<div class="error-screen" id="errorScreen">
    <i class="fas fa-book"></i>
    <h2>Chapter not found</h2>
    <p>This chapter doesn't exist or may have been removed.</p>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Archive</a>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyBnsU904MyOFhK3zLJB02U39e9f2UnGWio",
        authDomain: "lusales-archive.firebaseapp.com",
        projectId: "lusales-archive",
        storageBucket: "lusales-archive.firebasestorage.app",
        messagingSenderId: "56870938100",
        appId: "1:56870938100:web:28aa9c471f24e3f9ee05a1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // State
    let currentChapter  = null;
    let allBookChapters = [];
    let currentIndex    = 0;
    let fontSize        = 1.2;
    let barHideTimer    = null;

    // ── INIT ──────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        const params    = new URLSearchParams(window.location.search);
        const chapterId = params.get('chapter');

        if (!chapterId) { showError(); return; }

        try {
            // Load chapter
            const chapDoc = await db.collection('chapters').doc(chapterId).get();
            if (!chapDoc.exists) { showError(); return; }

            currentChapter = { id: chapDoc.id, ...chapDoc.data() };

            // Load book
            const bookDoc = await db.collection('books').doc(currentChapter.bookId).get();
            const book    = bookDoc.exists ? bookDoc.data() : null;

            // Load all chapters for this book
            const chapSnap = await db.collection('chapters')
                .where('bookId', '==', currentChapter.bookId)
                .get();

            allBookChapters = chapSnap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            currentIndex = allBookChapters.findIndex(c => c.id === chapterId);

            renderChapter(currentChapter, book);
            setupProgressBar();
            setupBarAutoHide();
            fadeOutLoader();

        } catch (err) {
            console.error(err);
            showError();
        }
    });

    // ── RENDER ────────────────────────────────────────────
    function renderChapter(chapter, book) {
        document.title = `${chapter.title} — Lusales Archive`;

        // Bar title
        document.getElementById('barTitle').innerHTML =
            `<span>${book ? escHtml(book.title) : ''}</span> &nbsp;·&nbsp; ${escHtml(chapter.title)}`;

        // Header
        document.getElementById('bookLabel').textContent =
            book ? `— ${book.title} —` : '— Lusales Archive —';
        document.getElementById('chapterTitle').textContent = chapter.title;
        document.getElementById('chapterMeta').textContent  = formatDate(chapter.date);

        // Body
        const body = document.getElementById('chapterBody');
        const paragraphs = chapter.content
            .split('\n')
            .filter(p => p.trim())
            .map(p => `<p>${escHtml(p)}</p>`)
            .join('');
        body.innerHTML = paragraphs || `<p>${escHtml(chapter.content)}</p>`;
        body.style.fontSize = `${fontSize}rem`;

        // Nav buttons
        updateNavButtons();

        document.getElementById('readerPage').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function updateNavButtons() {
        const prevBtn   = document.getElementById('prevBtn');
        const nextBtn   = document.getElementById('nextBtn');
        const prevTitle = document.getElementById('prevTitle');
        const nextTitle = document.getElementById('nextTitle');

        if (currentIndex > 0) {
            prevBtn.classList.remove('disabled');
            prevTitle.textContent = allBookChapters[currentIndex - 1].title;
        } else {
            prevBtn.classList.add('disabled');
            prevTitle.textContent = '—';
        }

        if (currentIndex < allBookChapters.length - 1) {
            nextBtn.classList.remove('disabled');
            nextTitle.textContent = allBookChapters[currentIndex + 1].title;
        } else {
            nextBtn.classList.add('disabled');
            nextTitle.textContent = '—';
        }
    }

    // ── NAVIGATION ────────────────────────────────────────
    function navigateChapter(direction) {
        const newIndex = currentIndex + direction;
        if (newIndex < 0 || newIndex >= allBookChapters.length) return;
        const newChapter = allBookChapters[newIndex];
        window.location.href = `reader.html?chapter=${newChapter.id}`;
    }

    function goBack() {
        if (document.referrer && document.referrer.includes(window.location.hostname)) {
            history.back();
        } else {
            window.location.href = 'index.html';
        }
    }

    // ── FONT SIZE ─────────────────────────────────────────
    function changeFontSize(direction) {
        fontSize = Math.min(Math.max(fontSize + (direction * 0.1), 0.9), 1.8);
        const body = document.getElementById('chapterBody');
        if (body) body.style.fontSize = `${fontSize}rem`;
    }

    // ── PROGRESS BAR ──────────────────────────────────────
    function setupProgressBar() {
        const bar = document.getElementById('progressBar');
        window.addEventListener('scroll', () => {
            const scrollTop    = window.scrollY;
            const docHeight    = document.documentElement.scrollHeight - window.innerHeight;
            const progress     = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            bar.style.width    = `${progress}%`;
        });
    }

    // ── AUTO HIDE BAR ON SCROLL ───────────────────────────
    function setupBarAutoHide() {
        const bar = document.getElementById('readerBar');
        let lastScroll = 0;

        window.addEventListener('scroll', () => {
            const currentScroll = window.scrollY;
            if (currentScroll > lastScroll && currentScroll > 150) {
                bar.classList.add('hidden');
            } else {
                bar.classList.remove('hidden');
            }
            lastScroll = currentScroll;
        });
    }

    // ── LOADER ────────────────────────────────────────────
    function fadeOutLoader() {
        const loader = document.getElementById('loadingScreen');
        loader.classList.add('fade-out');
        setTimeout(() => loader.style.display = 'none', 500);
    }

    function showError() {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display   = 'block';
    }

    // ── KEYBOARD NAV ─────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') navigateChapter(1);
        if (e.key === 'ArrowLeft')  navigateChapter(-1);
        if (e.key === 'Backspace' || e.key === 'Escape') goBack();
    });

    // ── UTILS ─────────────────────────────────────────────
    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }
</script>
</body>
</html>
