<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading — Lusales Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #0c0c0e;
            --bg-card:    #111116;
            --border:     #1e1e28;
            --accent:     #c8973a;
            --accent-dim: #7a5820;
            --text:       #e8e4d9;
            --text-muted: #6e6860;
            --text-dim:   #3a3830;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body:    'Crimson Text', Georgia, serif;
            --font-mono:    'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1.2rem;
            line-height: 1.85;
            min-height: 100vh;
        }

        /* ── TOP BAR ── */
        .reader-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 56px;
            background: rgba(12,12,14,0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            gap: 1rem;
            transition: opacity 0.4s, transform 0.4s;
        }

        .reader-bar.hidden {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .bar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .bar-title {
            font-family: var(--font-display);
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-title span { color: var(--accent); }

        .bar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .bar-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .bar-btn:hover { border-color: var(--accent); color: var(--accent); }
        .bar-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,151,58,0.1); }

        /* Auth button in bar */
        .bar-auth-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .bar-auth-btn:hover { border-color: var(--accent); color: var(--accent); }

        .bar-auth-btn img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        /* ── PROGRESS BAR ── */
        .progress-bar {
            position: fixed;
            top: 56px; left: 0;
            height: 2px;
            background: var(--accent);
            width: 0%;
            z-index: 99;
            transition: width 0.1s;
        }

        /* ── MAIN CONTENT ── */
        .reader-page {
            max-width: 680px;
            margin: 0 auto;
            padding: 100px 2rem 120px;
        }

        .chapter-header {
            margin-bottom: 3.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .book-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            display: block;
        }

        .chapter-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .chapter-meta {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── STAR RATING ── */
        .rating-section {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .rating-section h4 {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .stars {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }

        .star {
            font-size: 1.6rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.15s, transform 0.15s;
        }

        .star:hover,
        .star.hover,
        .star.filled {
            color: var(--accent);
        }

        .star:hover { transform: scale(1.2); }

        .rating-info {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .rating-info span {
            color: var(--accent);
        }

        .rating-login-prompt {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .rating-login-prompt a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        /* ── CHAPTER BODY ── */
        .chapter-body p {
            margin-bottom: 1.6em;
            text-indent: 2em;
            color: var(--text);
        }

        .chapter-body p:first-child { text-indent: 0; }

        .chapter-body p:first-child::first-letter {
            font-family: var(--font-display);
            font-size: 3.8em;
            font-weight: 700;
            color: var(--accent);
            float: left;
            line-height: 0.75;
            margin-right: 0.08em;
            margin-top: 0.12em;
        }

        /* ── CHAPTER NAV ── */
        .chapter-nav {
            margin-top: 5rem;
            padding-top: 2.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.9rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.25s;
            text-decoration: none;
            max-width: 45%;
        }

        .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,151,58,0.05); }
        .nav-btn.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

        .nav-btn-inner { display: flex; flex-direction: column; gap: 0.15rem; }
        .nav-label { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
        .nav-title { font-size: 0.82rem; color: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

        .chapter-divider { color: var(--accent-dim); font-family: var(--font-display); letter-spacing: 0.4em; font-size: 0.85rem; text-align: center; }

        /* ── LOADING / ERROR ── */
        .loading-screen {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 0.5s;
        }
        .loading-screen.fade-out { opacity: 0; pointer-events: none; }
        .loading-inner { text-align: center; }
        .loading-inner i { font-size: 2rem; color: var(--accent); animation: spin 1.5s linear infinite; display: block; margin-bottom: 1rem; }
        .loading-inner p { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.1em; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-screen { display:none; text-align:center; padding:6rem 2rem; }
        .error-screen i { font-size:3rem; color:var(--accent-dim); display:block; margin-bottom:1.5rem; }
        .error-screen h2 { font-family:var(--font-display); font-size:1.8rem; margin-bottom:1rem; color:var(--text); }
        .error-screen p { color:var(--text-muted); margin-bottom:2rem; }
        .error-screen a { font-family:var(--font-mono); font-size:0.8rem; color:var(--accent); border:1px solid var(--accent-dim); padding:0.6rem 1.5rem; border-radius:4px; text-decoration:none; transition:all 0.2s; }
        .error-screen a:hover { background:rgba(200,151,58,0.1); }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            z-index: 500;
            transition: transform 0.3s;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

        @media (max-width: 600px) {
            .reader-page { padding: 90px 1.25rem 100px; }
            .reader-bar { padding: 0 1rem; }
            .bar-title { display: none; }
            .nav-title { max-width: 100px; }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
        <i class="fas fa-book-open"></i>
        <p>Opening chapter...</p>
    </div>
</div>

<div class="reader-bar" id="readerBar">
    <div class="bar-left">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
        <span class="bar-title" id="barTitle">Loading...</span>
    </div>
    <div class="bar-right">
        <button class="bar-btn" id="bookmarkBtn" onclick="toggleBookmark()" title="Bookmark">
            <i class="far fa-bookmark"></i>
        </button>
        <button class="bar-btn" onclick="changeFontSize(-1)" title="Smaller text">A-</button>
        <button class="bar-btn" onclick="changeFontSize(1)" title="Larger text">A+</button>
        <button class="bar-auth-btn" id="barAuthBtn" onclick="handleBarAuth()">
            <i class="fab fa-google"></i> Sign in
        </button>
    </div>
</div>

<div class="progress-bar" id="progressBar"></div>

<div class="toast" id="toast"></div>

<div class="reader-page" id="readerPage" style="display:none">

    <div class="chapter-header">
        <span class="book-label" id="bookLabel">— book —</span>
        <h1 id="chapterTitle">Chapter Title</h1>
        <div class="chapter-meta" id="chapterMeta"></div>
    </div>

    <!-- Star Rating -->
    <div class="rating-section" id="ratingSection">
        <h4><i class="fas fa-star"></i> &nbsp;Rate this book</h4>
        <div class="stars" id="starsContainer">
            <i class="far fa-star star" data-value="1"></i>
            <i class="far fa-star star" data-value="2"></i>
            <i class="far fa-star star" data-value="3"></i>
            <i class="far fa-star star" data-value="4"></i>
            <i class="far fa-star star" data-value="5"></i>
        </div>
        <div class="rating-info" id="ratingInfo">Loading ratings...</div>
    </div>

    <div class="chapter-body" id="chapterBody"></div>

    <div class="chapter-divider">— ✦ —</div>

    <div class="chapter-nav">
        <button class="nav-btn disabled" id="prevBtn" onclick="navigateChapter(-1)">
            <i class="fas fa-chevron-left"></i>
            <div class="nav-btn-inner">
                <span class="nav-label">Previous</span>
                <span class="nav-title" id="prevTitle">—</span>
            </div>
        </button>
        <button class="nav-btn disabled" id="nextBtn" onclick="navigateChapter(1)">
            <div class="nav-btn-inner" style="text-align:right">
                <span class="nav-label">Next</span>
                <span class="nav-title" id="nextTitle">—</span>
            </div>
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>

<div class="error-screen" id="errorScreen">
    <i class="fas fa-book"></i>
    <h2>Chapter not found</h2>
    <p>This chapter doesn't exist or may have been removed.</p>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Archive</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnsU904MyOFhK3zLJB02U39e9f2UnGWio",
        authDomain: "lusales-archive.firebaseapp.com",
        projectId: "lusales-archive",
        storageBucket: "lusales-archive.firebasestorage.app",
        messagingSenderId: "56870938100",
        appId: "1:56870938100:web:28aa9c471f24e3f9ee05a1"
    };

    firebase.initializeApp(firebaseConfig);
    const db       = firebase.firestore();
    const auth     = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // State
    let currentChapter  = null;
    let currentBook     = null;
    let allBookChapters = [];
    let currentIndex    = 0;
    let fontSize        = 1.2;
    let currentUser     = null;
    let isBookmarked    = false;
    let userRating      = 0;

    // ── INIT ──────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        const params    = new URLSearchParams(window.location.search);
        const chapterId = params.get('chapter');
        if (!chapterId) { showError(); return; }

        // Auth listener
        auth.onAuthStateChanged(async user => {
            currentUser = user;
            updateBarAuth(user);
            if (currentChapter) {
                await loadUserData();
                updateBookmarkBtn();
                loadRatings();
            }
        });

        try {
            const chapDoc = await db.collection('chapters').doc(chapterId).get();
            if (!chapDoc.exists) { showError(); return; }
            currentChapter = { id: chapDoc.id, ...chapDoc.data() };

            const bookDoc = await db.collection('books').doc(currentChapter.bookId).get();
            currentBook   = bookDoc.exists ? { id: bookDoc.id, ...bookDoc.data() } : null;

            const chapSnap = await db.collection('chapters')
                .where('bookId', '==', currentChapter.bookId).get();
            allBookChapters = chapSnap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => new Date(a.date) - new Date(b.date));
            currentIndex = allBookChapters.findIndex(c => c.id === chapterId);

            renderChapter(currentChapter, currentBook);
            setupProgressBar();
            setupBarAutoHide();
            setupStars();
            loadRatings();
            fadeOutLoader();

        } catch (err) {
            console.error(err);
            showError();
        }
    });

    // ── AUTH ──────────────────────────────────────────────
    function updateBarAuth(user) {
        const btn = document.getElementById('barAuthBtn');
        if (!btn) return;
        if (user) {
            btn.innerHTML = user.photoURL
                ? `<img src="${user.photoURL}" alt=""> ${user.displayName ? user.displayName.split(' ')[0] : 'Account'}`
                : `<i class="fas fa-user-circle"></i> ${user.displayName ? user.displayName.split(' ')[0] : 'Account'}`;
        } else {
            btn.innerHTML = '<i class="fab fa-google"></i> Sign in';
        }
    }

    function handleBarAuth() {
        if (currentUser) {
            if (confirm('Sign out?')) auth.signOut();
        } else {
            auth.signInWithPopup(provider).catch(err => {
                showToast('Sign in failed. Try again.');
            });
        }
    }

    // ── BOOKMARK ──────────────────────────────────────────
    async function loadUserData() {
        if (!currentUser || !currentChapter) return;
        try {
            const bookmarkDoc = await db.collection('bookmarks')
                .doc(`${currentUser.uid}_${currentChapter.bookId}`).get();
            isBookmarked = bookmarkDoc.exists;

            const ratingDoc = await db.collection('ratings')
                .doc(`${currentUser.uid}_${currentChapter.bookId}`).get();
            userRating = ratingDoc.exists ? ratingDoc.data().rating : 0;
            renderStars(userRating);
        } catch (err) {
            console.error(err);
        }
    }

    function updateBookmarkBtn() {
        const btn  = document.getElementById('bookmarkBtn');
        if (!btn) return;
        const icon = btn.querySelector('i');
        if (isBookmarked) {
            icon.className = 'fas fa-bookmark';
            btn.classList.add('active');
        } else {
            icon.className = 'far fa-bookmark';
            btn.classList.remove('active');
        }
    }

    async function toggleBookmark() {
        if (!currentUser) {
            showToast('Sign in to bookmark chapters');
            return;
        }
        const ref = db.collection('bookmarks').doc(`${currentUser.uid}_${currentChapter.bookId}`);
        try {
            if (isBookmarked) {
                await ref.delete();
                isBookmarked = false;
                showToast('Bookmark removed');
            } else {
                await ref.set({
                    userId:    currentUser.uid,
                    bookId:    currentChapter.bookId,
                    chapterId: currentChapter.id,
                    bookTitle: currentBook ? currentBook.title : '',
                    savedAt:   new Date().toISOString()
                });
                isBookmarked = true;
                showToast('Bookmarked!');
            }
            updateBookmarkBtn();
        } catch (err) {
            showToast('Error saving bookmark');
        }
    }

    // ── RATINGS ───────────────────────────────────────────
    function setupStars() {
        const stars = document.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('mouseover', () => hoverStars(parseInt(star.dataset.value)));
            star.addEventListener('mouseout',  () => renderStars(userRating));
            star.addEventListener('click',     () => submitRating(parseInt(star.dataset.value)));
        });
    }

    function hoverStars(value) {
        document.querySelectorAll('.star').forEach(s => {
            const v = parseInt(s.dataset.value);
            s.className = v <= value ? 'fas fa-star star filled' : 'far fa-star star';
        });
    }

    function renderStars(value) {
        document.querySelectorAll('.star').forEach(s => {
            const v = parseInt(s.dataset.value);
            s.className = v <= value ? 'fas fa-star star filled' : 'far fa-star star';
        });
    }

    async function loadRatings() {
        if (!currentBook) return;
        try {
            const snap = await db.collection('ratings')
                .where('bookId', '==', currentBook.id).get();
            const ratingInfo = document.getElementById('ratingInfo');

            if (snap.empty) {
                ratingInfo.innerHTML = 'No ratings yet — be the first!';
                return;
            }

            const ratings = snap.docs.map(d => d.data().rating);
            const avg     = (ratings.reduce((a,b) => a+b, 0) / ratings.length).toFixed(1);
            const count   = ratings.length;

            ratingInfo.innerHTML = `<span>${avg} / 5</span> &nbsp;·&nbsp; ${count} rating${count !== 1 ? 's' : ''}`;

            // Show user's own rating if logged in
            if (currentUser && userRating > 0) {
                ratingInfo.innerHTML += ` &nbsp;·&nbsp; Your rating: <span>${userRating}</span>`;
                renderStars(userRating);
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function submitRating(value) {
        if (!currentUser) {
            showToast('Sign in to rate this book');
            renderStars(userRating);
            return;
        }
        if (!currentBook) return;

        try {
            await db.collection('ratings')
                .doc(`${currentUser.uid}_${currentBook.id}`)
                .set({
                    userId: currentUser.uid,
                    bookId: currentBook.id,
                    rating: value,
                    ratedAt: new Date().toISOString()
                });
            userRating = value;
            renderStars(userRating);
            showToast(`Rated ${value} star${value !== 1 ? 's' : ''}!`);
            loadRatings();
        } catch (err) {
            showToast('Error saving rating');
        }
    }

    // ── RENDER ────────────────────────────────────────────
    function renderChapter(chapter, book) {
        document.title = `${chapter.title} — Lusales Archive`;
        document.getElementById('barTitle').innerHTML =
            `<span>${book ? escHtml(book.title) : ''}</span> &nbsp;·&nbsp; ${escHtml(chapter.title)}`;
        document.getElementById('bookLabel').textContent =
            book ? `— ${book.title} —` : '— Lusales Archive —';
        document.getElementById('chapterTitle').textContent = chapter.title;
        document.getElementById('chapterMeta').textContent  = formatDate(chapter.date);

        const body = document.getElementById('chapterBody');
        const paragraphs = chapter.content
            .split('\n').filter(p => p.trim())
            .map(p => `<p>${escHtml(p)}</p>`).join('');
        body.innerHTML = paragraphs || `<p>${escHtml(chapter.content)}</p>`;
        body.style.fontSize = `${fontSize}rem`;

        updateNavButtons();
        document.getElementById('readerPage').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function updateNavButtons() {
        const prevBtn   = document.getElementById('prevBtn');
        const nextBtn   = document.getElementById('nextBtn');
        const prevTitle = document.getElementById('prevTitle');
        const nextTitle = document.getElementById('nextTitle');

        if (currentIndex > 0) {
            prevBtn.classList.remove('disabled');
            prevTitle.textContent = allBookChapters[currentIndex - 1].title;
        } else {
            prevBtn.classList.add('disabled');
            prevTitle.textContent = '—';
        }

        if (currentIndex < allBookChapters.length - 1) {
            nextBtn.classList.remove('disabled');
            nextTitle.textContent = allBookChapters[currentIndex + 1].title;
        } else {
            nextBtn.classList.add('disabled');
            nextTitle.textContent = '—';
        }
    }

    // ── NAVIGATION ────────────────────────────────────────
    function navigateChapter(direction) {
        const newIndex = currentIndex + direction;
        if (newIndex < 0 || newIndex >= allBookChapters.length) return;
        window.location.href = `reader.html?chapter=${allBookChapters[newIndex].id}`;
    }

    function goBack() {
        if (document.referrer && document.referrer.includes(window.location.hostname)) {
            history.back();
        } else {
            window.location.href = 'index.html';
        }
    }

    // ── FONT SIZE ─────────────────────────────────────────
    function changeFontSize(direction) {
        fontSize = Math.min(Math.max(fontSize + (direction * 0.1), 0.9), 1.8);
        const body = document.getElementById('chapterBody');
        if (body) body.style.fontSize = `${fontSize}rem`;
    }

    // ── PROGRESS BAR ──────────────────────────────────────
    function setupProgressBar() {
        const bar = document.getElementById('progressBar');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            bar.style.width = docHeight > 0 ? `${(scrollTop / docHeight) * 100}%` : '0%';
        });
    }

    // ── AUTO HIDE BAR ─────────────────────────────────────
    function setupBarAutoHide() {
        const bar = document.getElementById('readerBar');
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const cur = window.scrollY;
            if (cur > lastScroll && cur > 150) bar.classList.add('hidden');
            else bar.classList.remove('hidden');
            lastScroll = cur;
        });
    }

    // ── TOAST ─────────────────────────────────────────────
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── LOADER ────────────────────────────────────────────
    function fadeOutLoader() {
        const loader = document.getElementById('loadingScreen');
        loader.classList.add('fade-out');
        setTimeout(() => loader.style.display = 'none', 500);
    }

    function showError() {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display   = 'block';
    }

    // ── KEYBOARD ──────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') navigateChapter(1);
        if (e.key === 'ArrowLeft')  navigateChapter(-1);
        if (e.key === 'Escape')     goBack();
    });

    // ── UTILS ─────────────────────────────────────────────
    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }
</script>
</body>
</html>
